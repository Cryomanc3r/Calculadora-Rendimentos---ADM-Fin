<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Investimentos: CDI Dinâmico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Simulador de Investimentos: CDI Dinâmico</h1>
        <p><strong>Disciplina:</strong> Administração Financeira - CAD 167</p>
        <p><strong>Tema:</strong> Valor do Dinheiro no Tempo</p>

        <form id="calc-form">
            <div class="form-group">
                <label for="tipo-investimento">Tipo de Investimento</label>
                <select id="tipo-investimento">
                    <option value="cdi">CDI (Meta Selic)</option>
                    <option value="poupanca">Poupança (Rendimento)</option>
                    <option value="prefixado">Tesouro Direto Prefixado</option>
                    <option value="ipca">Tesouro Direto IPCA+</option>
                </select>
            </div>

            <div class="form-group taxa-info-box">
                <label>Taxa Anual Captada - <span id="status-api" class="loading" aria-live="polite">Buscando taxas...</span></label>
                <input type="number" id="taxa-anual" step="0.01" required readonly class="taxa-display">
                <p id="taxa-detalhe" class="taxa-detalhe"></p>
            </div>

            <div class="form-group" id="grupo-percentual-cdi">
                <label for="percentual-cdi">Rentabilidade (% do CDI)</label>
                <input type="number" id="percentual-cdi" value="100" step="1" required>
            </div>

            <div class="form-group">
                <label for="valor-inicial">Valor Inicial (R$)</label>
                <input type="number" id="valor-inicial" value="1000" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="aporte-mensal">Aporte Mensal (R$)</label>
                <input type="number" id="aporte-mensal" value="200" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="saque-mensal">Saque Mensal (R$)</label>
                <input type="number" id="saque-mensal" value="0" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="meses">Prazo (Meses)</label>
                <input type="number" id="meses" value="12" step="1" required>
            </div>

            <button type="submit">Gerar Relatório de Evolução</button>
        </form>

        <section id="area-relatorio" aria-live="polite">
            <h2>Relatório Decorrente da Execução</h2>
            <div id="resumo"></div>
            <div class="grafico-container">
                <canvas id="grafico-resultado"></canvas>
            </div>
            <table id="tabela-relatorio">
                <thead>
                    <tr>
                        <th>Mês</th>
                        <th>Saldo Inicial</th>
                        <th>Rendimento</th>
                        <th>Aporte/Saque Líquido</th>
                        <th>Saldo Final</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
